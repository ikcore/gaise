# GAISe Model Compatibility Registry
# Last audited: 2026-04-03 (full audit)
#
# This file is the source of truth for model capabilities across providers.
# The model-audit agent checks this against live provider APIs and flags drift.
#
# Fields:
#   provider          - GAISe provider key (openai, anthropic, gemini, vertexai, ollama, bedrock)
#   model             - Model ID as passed to the provider API
#   reasoning         - Whether the model supports reasoning/thinking
#   reasoning_values  - Accepted reasoning_effort / thinking_effort values
#   reasoning_default - Default reasoning level (if reasoning is enabled)
#   max_output_field  - The provider-native field name for max output tokens
#   embeddings        - Whether the model supports embeddings
#   streaming         - Whether the model supports streaming
#   tools             - Whether the model supports function calling / tools
#   status            - "ga" (generally available), "preview", "deprecated", "shutdown"
#   shutdown_date     - ISO date when the model shuts down (if known)
#   notes             - Anything non-obvious about this model

